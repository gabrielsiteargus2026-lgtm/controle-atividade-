<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✅ Verificar Sincronização</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.8em;
        }
        .status-box {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #ddd;
        }
        .status-box.ok {
            border-left-color: #51cf66;
            background: #f0fdf4;
        }
        .status-box.error {
            border-left-color: #ff6b6b;
            background: #fdf1f1;
        }
        .status-box.warning {
            border-left-color: #ffd43b;
            background: #fffbea;
        }
        .label {
            font-weight: bold;
            color: #666;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        .value {
            font-size: 1.1em;
            color: #333;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        .icon {
            margin-right: 8px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        button.secondary {
            background: #95a5a6;
        }
        button.secondary:hover {
            background: #7f8c8d;
        }
        .divider {
            height: 1px;
            background: #ddd;
            margin: 20px 0;
        }
        small {
            color: #999;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Verificação de Sincronização</h1>

        <div class="status-box" id="firebaseStatus">
            <div class="label"><span class="icon">🔥</span> Firebase</div>
            <div class="value">Verificando...</div>
        </div>

        <div class="status-box" id="localStatus">
            <div class="label"><span class="icon">💾</span> localStorage</div>
            <div class="value">Verificando...</div>
        </div>

        <div class="status-box" id="computadorStatus">
            <div class="label"><span class="icon">💻</span> Computador</div>
            <div class="value" id="computadorInfo">-</div>
        </div>

        <div class="status-box" id="urlStatus">
            <div class="label"><span class="icon">🌐</span> URL</div>
            <div class="value" id="urlInfo">-</div>
        </div>

        <div class="divider"></div>

        <button onclick="recarregar()">🔄 Recarregar Verificação</button>
        <button onclick="abrirDiagnostico()" class="secondary">🔧 Abrir Diagnóstico</button>
        <button onclick="irParaPrincipal()" class="secondary">🏠 Ir para Principal</button>

        <div style="text-align: center; margin-top: 20px; color: #999; font-size: 0.85em;">
            <p>Abra esta página em múltiplos navegadores/dispositivos</p>
            <p>e observe as mudanças em tempo real</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBoLGZgImxHrg_n8Lq12Ppv80m5HLXQKjs",
          authDomain: "controle-atividade-a6b6d.firebaseapp.com",
          databaseURL: "https://controle-atividade-a6b6d-default-rtdb.firebaseio.com",
          projectId: "controle-atividade-a6b6d",
          storageBucket: "controle-atividade-a6b6d.appspot.com",
          messagingSenderId: "449852839157",
          appId: "1:449852839157:web:da90aec3840427f375e1bc"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            const dadosRef = ref(db, "controle-atividade/dados");

            // Informações do computador
            document.getElementById('computadorInfo').textContent = 
                window.location.hostname || 'localhost';
            document.getElementById('urlInfo').textContent = 
                window.location.href.split('?')[0];

            // Verificar localStorage
            function verificarLocal() {
                const emAndamento = JSON.parse(localStorage.getItem('atividadesEmAndamento') || '[]');
                const concluidas = JSON.parse(localStorage.getItem('atividades') || '[]');
                const total = emAndamento.length + concluidas.length;

                const box = document.getElementById('localStatus');
                const classe = total > 0 ? 'ok' : 'warning';
                
                box.className = `status-box ${classe}`;
                box.innerHTML = `
                    <div class="label"><span class="icon">💾</span> localStorage</div>
                    <div class="value">${emAndamento.length} em andamento + ${concluidas.length} concluídas (Total: ${total})</div>
                    <small>${total > 0 ? '✅ Dados encontrados' : '⚠️ Sem dados locais'}</small>
                `;
            }

            // Verificar Firebase
            async function verificarFirebase() {
                try {
                    const snapshot = await get(dadosRef);
                    const dados = snapshot.val();

                    const box = document.getElementById('firebaseStatus');
                    
                    if (dados) {
                        const emAndamento = (dados.atividadesEmAndamento || []).length;
                        const concluidas = (dados.atividades || []).length;
                        
                        box.className = 'status-box ok';
                        box.innerHTML = `
                            <div class="label"><span class="icon">🔥</span> Firebase</div>
                            <div class="value">✅ Conectado | ${emAndamento} + ${concluidas}</div>
                            <small>Última atualização: ${new Date(dados.ultimaAtualizacao || Date.now()).toLocaleString('pt-BR')}</small>
                        `;

                        // Ativar listener para mudanças em tempo real
                        onValue(dadosRef, (snap) => {
                            const novosDados = snap.val();
                            if (novosDados) {
                                const em = (novosDados.atividadesEmAndamento || []).length;
                                const conc = (novosDados.atividades || []).length;
                                box.innerHTML = `
                                    <div class="label"><span class="icon">🔥</span> Firebase (📡 SINCRONIZANDO)</div>
                                    <div class="value">✅ Conectado | ${em} + ${conc}</div>
                                    <small>Atualizado: ${new Date().toLocaleTimeString('pt-BR')}</small>
                                `;
                            }
                        });
                    } else {
                        box.className = 'status-box warning';
                        box.innerHTML = `
                            <div class="label"><span class="icon">🔥</span> Firebase</div>
                            <div class="value">⚠️ Firebase vazio</div>
                            <small>Abra o site principal para popular dados</small>
                        `;
                    }
                } catch (error) {
                    const box = document.getElementById('firebaseStatus');
                    box.className = 'status-box error';
                    box.innerHTML = `
                        <div class="label"><span class="icon">🔥</span> Firebase</div>
                        <div class="value">❌ Erro: ${error.message}</div>
                    `;
                }
            }

            window.recarregar = function() {
                location.reload();
            };

            window.abrirDiagnostico = function() {
                window.open('./diagnostico-firebase.html', '_blank');
            };

            window.irParaPrincipal = function() {
                window.location.href = './index.html';
            };

            // Auto-verificar
            verificarLocal();
            verificarFirebase();

            // Re-verificar a cada 3 segundos
            setInterval(verificarLocal, 3000);

        } catch (error) {
            console.error("Erro ao inicializar Firebase:", error);
            document.getElementById('firebaseStatus').innerHTML = `
                <div class="label"><span class="icon">🔥</span> Firebase</div>
                <div class="value">❌ Erro ao conectar: ${error.message}</div>
            `;
        }
    </script>
</body>
</html>
