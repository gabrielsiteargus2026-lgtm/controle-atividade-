<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Sincronização Firebase</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #4ec9b0;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            border-left: 4px solid;
        }
        .success {
            background: #1e3a1f;
            border-color: #51cf66;
            color: #51cf66;
        }
        .error {
            background: #3a1f1f;
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        .warning {
            background: #3a3a1f;
            border-color: #ffc107;
            color: #ffc107;
        }
        .info {
            background: #1f2a3a;
            border-color: #5BA3D1;
            color: #5BA3D1;
        }
        .console {
            background: #000;
            border: 1px solid #444;
            padding: 15px;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
            margin: 20px 0;
        }
        .log {
            margin: 5px 0;
            padding: 5px;
            border-left: 2px solid #666;
            padding-left: 10px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #5BA3D1;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #4a8dc1;
        }
    </style>
</head>
<body>
    <h1>🔍 Debug - Sincronização Firebase</h1>
    
    <div id="statusContainer"></div>
    
    <h2>📊 Console de Debug</h2>
    <button onclick="limparConsole()">🗑️ Limpar Console</button>
    <button onclick="testarConexao()">🔌 Testar Conexão</button>
    <button onclick="recarregarDados()">🔄 Recarregar Dados</button>
    <button onclick="voltar()">◀️ Voltar para Index</button>
    
    <div class="console" id="console"></div>

    <script src="firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const statusContainer = document.getElementById('statusContainer');
        const consoleDiv = document.getElementById('console');
        let db = null;
        let app = null;

        function log(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = 'log';
            logEntry.style.color = type === 'success' ? '#51cf66' : type === 'error' ? '#ff6b6b' : type === 'warning' ? '#ffc107' : '#5BA3D1';
            logEntry.textContent = `[${timestamp}] ${msg}`;
            consoleDiv.appendChild(logEntry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        function mostrarStatus(titulo, mensagem, tipo) {
            const div = document.createElement('div');
            div.className = `status ${tipo}`;
            div.innerHTML = `<strong>${titulo}:</strong> ${mensagem}`;
            statusContainer.appendChild(div);
        }

        async function inicializar() {
            log('🚀 Iniciando diagnóstico...', 'info');

            try {
                // 1. Verificar Firebase Config
                if (!window.firebaseConfig) {
                    throw new Error('firebaseConfig não encontrado!');
                }
                log('✅ Firebase Config carregado', 'success');
                mostrarStatus('Firebase Config', 'Carregado com sucesso', 'success');

                // 2. Inicializar Firebase
                app = initializeApp(window.firebaseConfig);
                log('✅ Firebase App inicializado', 'success');
                mostrarStatus('Firebase App', 'Inicializado com sucesso', 'success');

                // 3. Conectar ao Database
                db = getDatabase(app);
                log('✅ Database conectado', 'success');
                mostrarStatus('Database', 'Conectado com sucesso', 'success');

                // 4. Testar conexão com realtime listener
                log('🔌 Testando listener em tempo real...', 'info');
                let timeoutHandle = setTimeout(() => {
                    log('⚠️ Timeout no listener (5s sem resposta)', 'warning');
                }, 5000);

                onValue(ref(db, 'atividades_em_andamento'), (snapshot) => {
                    clearTimeout(timeoutHandle);
                    const dados = snapshot.val() || {};
                    const count = Object.keys(dados).length;
                    log(`✅ Listener ativo! ${count} atividades em andamento`, 'success');
                    mostrarStatus('Listener Realtime', `Funcionando! ${count} registros`, 'success');
                    
                    if (count > 0) {
                        log('📋 Dados recebidos:', 'info');
                        Object.entries(dados).forEach(([id, atividade]) => {
                            log(`  - ${atividade.colaborador} | ${atividade.ticket} | ${atividade.status}`, 'info');
                        });
                    }
                }, (error) => {
                    clearTimeout(timeoutHandle);
                    log(`❌ Erro no listener: ${error.message}`, 'error');
                    mostrarStatus('Listener', `Erro: ${error.message}`, 'error');
                });

                // 5. Testar leitura única (get)
                log('📖 Testando leitura única...', 'info');
                get(ref(db, 'atividades')).then((snapshot) => {
                    const count = Object.keys(snapshot.val() || {}).length;
                    log(`✅ Leitura bem-sucedida! ${count} atividades concluídas`, 'success');
                    mostrarStatus('Leitura', `${count} atividades concluídas`, 'success');
                }).catch(e => {
                    log(`❌ Erro na leitura: ${e.message}`, 'error');
                    mostrarStatus('Leitura', `Erro: ${e.message}`, 'error');
                });

            } catch (e) {
                log(`❌ ERRO CRÍTICO: ${e.message}`, 'error');
                mostrarStatus('Erro', e.message, 'error');
                console.error(e);
            }
        }

        window.testarConexao = async () => {
            log('🔄 Testando conexão...', 'info');
            try {
                const snapshot = await get(ref(db, '.info/connected'));
                if (snapshot.val() === true) {
                    log('✅ Conectado ao Firebase!', 'success');
                    mostrarStatus('Conexão', 'Online', 'success');
                } else {
                    log('❌ Desconectado do Firebase!', 'error');
                    mostrarStatus('Conexão', 'Offline', 'error');
                }
            } catch (e) {
                log(`❌ Erro ao testar: ${e.message}`, 'error');
            }
        };

        window.recarregarDados = async () => {
            log('🔄 Recarregando dados...', 'info');
            try {
                const snapshot = await get(ref(db, 'atividades_em_andamento'));
                const dados = snapshot.val() || {};
                log(`✅ ${Object.keys(dados).length} atividades carregadas`, 'success');
            } catch (e) {
                log(`❌ Erro: ${e.message}`, 'error');
            }
        };

        window.limparConsole = () => {
            consoleDiv.innerHTML = '';
            log('✅ Console limpo', 'success');
        };

        window.voltar = () => {
            window.location.href = 'index.html';
        };

        // Iniciar diagnóstico ao carregar
        inicializar();
    </script>
</body>
</html>
