<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ranking de Colaboradores</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
            padding-top: 180px;
        }

        .header-logo {
            position: fixed;
            top: 10px;
            left: 10px;
            width: 150px;
            height: 150px;
            object-fit: contain;
            z-index: 10000;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #333;
            text-align: center;
        }

        .header p {
            font-size: 0.95em;
            opacity: 0.9;
            color: #666;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 30px;
            margin-bottom: 20px;
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }

        .form-group input[type="date"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .ranking-list {
            list-style: none;
        }

        .ranking-item {
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 10px;
            background: #f5f5f5;
            border-left: 5px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .ranking-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .ranking-item.first {
            border-left-color: #ffd700;
            background: linear-gradient(135deg, #fffef0 0%, #fffacd 100%);
            transform: scale(1.02);
        }

        .ranking-item.first:hover {
            transform: scale(1.02) translateX(5px);
        }

        .ranking-item.second {
            border-left-color: #c0c0c0;
            background: linear-gradient(135deg, #f8f8f8 0%, #e8e8e8 100%);
        }

        .ranking-item.third {
            border-left-color: #cd7f32;
            background: linear-gradient(135deg, #faf5f0 0%, #ffe4d4 100%);
        }

        .ranking-position {
            font-size: 1.8em;
            margin-right: 15px;
            min-width: 40px;
        }

        .ranking-info {
            flex: 1;
        }

        .ranking-name {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .ranking-details {
            font-size: 0.85em;
            color: #666;
        }

        .ranking-count {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1.1em;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }

        .auto-refresh {
            text-align: center;
            color: #999;
            font-size: 0.85em;
            margin-top: 20px;
        }

        .last-update {
            color: #667eea;
            font-weight: bold;
        }
    </style>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        if (typeof FIREBASE_CONFIG !== 'undefined' && FIREBASE_CONFIG.databaseURL && !FIREBASE_CONFIG.databaseURL.includes('COLE_AQUI')) {
            firebase.initializeApp(FIREBASE_CONFIG);
            window.db = firebase.database();
            window.FIREBASE_OK = true;
        } else {
            window.FIREBASE_OK = false;
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="argus-logo 1.png" alt="Argus" class="header-logo">
            <h1>Dashboard de Ranking</h1>
        </div>

        <div class="card">
            <h2>Filtrar por Data</h2>
            <div class="form-group">
                <label for="filtroData">Selecione uma data:</label>
                <input type="date" id="filtroData">
            </div>
        </div>

        <div class="card">
            <h2>🥇 Ranking do Dia</h2>
            <ul class="ranking-list" id="rankingList">
                <div class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <p>Carregando dados...</p>
                </div>
            </ul>

            <div class="stats" id="statsContainer"></div>

            <div class="auto-refresh">
                ⏱️ Última atualização: <span class="last-update" id="ultimaAtualizacao">agora</span>
                <br>
                Atualiza automaticamente a cada 2 segundos
            </div>
        </div>
    </div>

    <script>
        // Elementos do DOM
        const filtroData = document.getElementById('filtroData');
        const rankingList = document.getElementById('rankingList');
        const statsContainer = document.getElementById('statsContainer');
        const ultimaAtualizacao = document.getElementById('ultimaAtualizacao');

        let atividades = [];
        let atividadesEmAndamento = [];

        // ✅ Carregar dados do Firebase com atualização em tempo real
        function carregarDados() {
            if (window.FIREBASE_OK) {
                db.ref('/').on('value', (snapshot) => {
                    const dados = snapshot.val() || {};
                    atividades = dados.atividades || [];
                    atividadesEmAndamento = dados.atividadesEmAndamento || [];
                    atualizarRanking();
                    ultimaAtualizacao.textContent = new Date().toLocaleTimeString('pt-BR');
                });
            } else {
                // Fallback localStorage
                const dadosSalvos = localStorage.getItem('atividades');
                const emAndamentoSalvos = localStorage.getItem('atividadesEmAndamento');
                if (dadosSalvos) atividades = JSON.parse(dadosSalvos);
                if (emAndamentoSalvos) atividadesEmAndamento = JSON.parse(emAndamentoSalvos);
            }
        }

        // Atualizar ranking
        function atualizarRanking() {
            const dataSelecionada = filtroData.value;
            if (!dataSelecionada) {
                rankingList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📅</div><p>Selecione uma data</p></div>';
                statsContainer.innerHTML = '';
                return;
            }

            // Converter data do input (YYYY-MM-DD) para formato DD/MM/YYYY
            const [ano, mes, dia] = dataSelecionada.split('-');
            const dataFormatada = `${dia}/${mes}/${ano}`;

            // Contar atividades finalizadas por colaborador nesta data (apenas do histórico)
            const ranking = {};

            atividades.forEach(atividade => {
                if (atividade.dataInicio === dataFormatada) {
                    if (!ranking[atividade.colaborador]) {
                        ranking[atividade.colaborador] = {
                            total: 0,
                            finalizadas: 0
                        };
                    }
                    ranking[atividade.colaborador].total++;
                    ranking[atividade.colaborador].finalizadas++;
                }
            });

            atividadesEmAndamento.forEach(atividade => {
                if (atividade.dataInicio === dataFormatada) {
                    if (!ranking[atividade.nome]) {
                        ranking[atividade.nome] = {
                            total: 0,
                            finalizadas: 0
                        };
                    }
                    ranking[atividade.nome].total++;
                }
            });

            // Converter para array e ordenar
            const rankingArray = Object.entries(ranking)
                .map(([colaborador, dados]) => ({ 
                    colaborador, 
                    total: dados.total,
                    finalizadas: dados.finalizadas
                }))
                .sort((a, b) => b.total - a.total);

            if (rankingArray.length === 0) {
                rankingList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>Nenhuma atividade registrada neste dia</p></div>';
                statsContainer.innerHTML = '';
                return;
            }

            // Gerar HTML do ranking
            rankingList.innerHTML = rankingArray.map((item, index) => {
                let classe = '';
                const medalhas = ['🥇', '🥈', '🥉'];
                const icone = index < 3 ? medalhas[index] : `<span style="color: #667eea; font-weight: bold;">${index + 1}</span>`;

                if (index === 0) classe = 'first';
                else if (index === 1) classe = 'second';
                else if (index === 2) classe = 'third';

                const emAndamento = item.total - item.finalizadas;
                const statusText = emAndamento > 0 
                    ? `<span style="font-size: 0.8em;">🔄 ${emAndamento} em andamento</span>`
                    : '';

                return `
                    <li class="ranking-item ${classe}">
                        <span class="ranking-position">${icone}</span>
                        <div class="ranking-info">
                            <div class="ranking-name">${item.colaborador}</div>
                            <div class="ranking-details">
                                ✅ ${item.finalizadas} finalizadas ${statusText}
                            </div>
                        </div>
                        <span class="ranking-count">${item.total}</span>
                    </li>
                `;
            }).join('');

            // Atualizar estatísticas
            const totalAtividades = rankingArray.reduce((sum, item) => sum + item.total, 0);
            const totalFinalizadas = rankingArray.reduce((sum, item) => sum + item.finalizadas, 0);
            const emAndamento = totalAtividades - totalFinalizadas;

            statsContainer.innerHTML = `
                <div class="stat-box">
                    <div class="stat-value">${totalAtividades}</div>
                    <div class="stat-label">Total de Atividades</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${totalFinalizadas}</div>
                    <div class="stat-label">Finalizadas</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${emAndamento}</div>
                    <div class="stat-label">Em Andamento</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${rankingArray.length}</div>
                    <div class="stat-label">Colaboradores</div>
                </div>
            `;

            // Atualizar hora da última atualização
            const agora = new Date();
            ultimaAtualizacao.textContent = agora.toLocaleTimeString('pt-BR');
        }

        // Event listeners
        filtroData.addEventListener('change', atualizarRanking);

        // Atualizar a cada 2 segundos
        // Inicializar (Firebase já faz atualização em tempo real, sem necessidade de polling)
        carregarDados();
        // Fallback: polling a cada 2s apenas se Firebase não estiver configurado
        if (!window.FIREBASE_OK) {
            setInterval(() => { carregarDados(); atualizarRanking(); }, 2000);
        }

        // Definir data padrão como hoje
        const hoje = new Date();
        const ano = hoje.getFullYear();
        const mes = String(hoje.getMonth() + 1).padStart(2, '0');
        const dia = String(hoje.getDate()).padStart(2, '0');
        filtroData.value = `${ano}-${mes}-${dia}`;

        // Primeira atualização
        atualizarRanking();
    </script>
</body>
</html>
