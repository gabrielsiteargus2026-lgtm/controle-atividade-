<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Diagnóstico Firebase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #0f0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #ff0;
            font-size: 1.5em;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background: #1a1a1a;
            border: 2px solid #0f0;
            border-radius: 5px;
            padding: 15px;
        }
        .panel h2 {
            color: #0f0;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        .status {
            padding: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #0f0;
        }
        .status.error {
            color: #f00;
            border-left-color: #f00;
        }
        .status.warning {
            color: #ff0;
            border-left-color: #ff0;
        }
        .status.success {
            color: #0f0;
            border-left-color: #0f0;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
            margin: 5px 5px 5px 0;
            font-weight: bold;
        }
        button:hover { background: #0a0; }
        .log {
            background: #0a0a0a;
            border: 1px solid #0f0;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85em;
            margin-top: 10px;
        }
        .log-item {
            margin-bottom: 5px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
        }
        .time { color: #ff0; }
        .type { color: #0ff; font-weight: bold; }
        .msg { color: #0f0; }
        .data-display {
            background: #0a0a0a;
            border: 1px solid #0f0;
            padding: 10px;
            margin-top: 10px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.8em;
        }
        .full-width { grid-column: 1 / -1; }
    </style>
</head>
<body>
    <div class="header">🔥 DIAGNÓSTICO FIREBASE - SINCRONIZAÇÃO</div>
    
    <div class="container">
        <div class="panel">
            <h2>📡 Status Firebase</h2>
            <div id="firebaseStatus" class="status warning">⏳ Conectando...</div>
            <div id="connectionInfo" style="font-size: 0.9em; color: #888;"></div>
            <button onclick="testConnection()">🔌 Testar Conexão</button>
            <button onclick="loadFirebaseData()">📥 Carregar Dados</button>
        </div>

        <div class="panel">
            <h2>💾 Dados Locais (localStorage)</h2>
            <div id="localStorageInfo" class="status warning">Carregando...</div>
            <button onclick="showLocalStorage()">📋 Ver localStorage</button>
            <button onclick="clearLocalStorage()">🗑️ Limpar localStorage</button>
        </div>

        <div class="panel">
            <h2>🟢 Atividades em Andamento</h2>
            <div id="emAndamentoStatus">Aguardando sincronização...</div>
            <div class="data-display" id="emAndamentoData"></div>
        </div>

        <div class="panel">
            <h2>✅ Atividades Concluídas</h2>
            <div id="concluidasStatus">Aguardando sincronização...</div>
            <div class="data-display" id="concluidasData"></div>
        </div>

        <div class="panel full-width">
            <h2>📝 Log de Sincronização</h2>
            <button onclick="clearLog()">🗑️ Limpar Log</button>
            <div class="log" id="logContainer"></div>
        </div>

        <div class="panel full-width">
            <h2>⚙️ Ações de Diagnóstico</h2>
            <button onclick="syncLocalToFirebase()">↗️ Sincronizar localStorage → Firebase</button>
            <button onclick="syncFirebaseToLocal()">↙️ Sincronizar Firebase → localStorage</button>
            <button onclick="resetEverything()">🔄 Reset Completo (CUIDADO!)</button>
            <button onclick="deleteAllFirebase()">🗑️ Deletar Firebase (CUIDADO!)</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getDatabase, 
            ref, 
            get,
            remove,
            set,
            onChildAdded,
            onChildChanged,
            onChildRemoved
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBoLGZgImxHrg_n8Lq12Ppv80m5HLXQKjs",
          authDomain: "controle-atividade-a6b6d.firebaseapp.com",
          databaseURL: "https://controle-atividade-a6b6d-default-rtdb.firebaseio.com",
          projectId: "controle-atividade-a6b6d",
          storageBucket: "controle-atividade-a6b6d.appspot.com",
          messagingSenderId: "449852839157",
          appId: "1:449852839157:web:da90aec3840427f375e1bc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const logs = [];

        function addLog(type, message, data = null) {
            const time = new Date().toLocaleTimeString('pt-BR');
            logs.unshift({ time, type, message, data });
            if (logs.length > 100) logs.pop();
            updateLogUI();
            console.log(`[${time}] [${type}] ${message}`, data);
        }

        function updateLogUI() {
            const container = document.getElementById('logContainer');
            container.innerHTML = logs.map(log => `
                <div class="log-item">
                    <span class="time">${log.time}</span>
                    <span class="type">[${log.type}]</span>
                    <span class="msg">${log.message}</span>
                </div>
            `).join('');
        }

        window.clearLog = () => {
            logs.length = 0;
            updateLogUI();
        };

        // Verificar localStorage
        function checkLocalStorage() {
            const emAndamento = JSON.parse(localStorage.getItem('atividadesEmAndamento') || '[]');
            const concluidas = JSON.parse(localStorage.getItem('atividades') || '[]');
            
            const info = document.getElementById('localStorageInfo');
            info.className = 'status success';
            info.textContent = `✅ localStorage: ${emAndamento.length} em andamento + ${concluidas.length} concluídas`;

            addLog('LOCAL', `localStorage: ${emAndamento.length} + ${concluidas.length} atividades`);
        }

        window.showLocalStorage = () => {
            const emAndamento = JSON.parse(localStorage.getItem('atividadesEmAndamento') || '[]');
            const concluidas = JSON.parse(localStorage.getItem('atividades') || '[]');
            
            const modal = document.createElement('div');
            modal.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 9999; overflow: auto; color: #0f0; padding: 20px; font-family: monospace;';
            modal.innerHTML = `
                <button onclick="this.parentElement.remove()" style="position: fixed; top: 10px; right: 10px;">✕ Fechar</button>
                <pre>${JSON.stringify({emAndamento, concluidas}, null, 2)}</pre>
            `;
            document.body.appendChild(modal);
        };

        window.clearLocalStorage = () => {
            if (!confirm('Limpar localStorage?')) return;
            localStorage.clear();
            checkLocalStorage();
            addLog('ACTION', 'localStorage limpo');
        };

        // Testar conexão Firebase
        window.testConnection = async () => {
            addLog('TEST', 'Testando conexão Firebase...');
            try {
                const snapshot = await get(ref(db, 'atividades_em_andamento'));
                const status = document.getElementById('firebaseStatus');
                status.className = 'status success';
                status.textContent = '✅ Firebase conectado e respondendo';
                addLog('SUCCESS', 'Conexão Firebase OK');
            } catch (error) {
                const status = document.getElementById('firebaseStatus');
                status.className = 'status error';
                status.textContent = `❌ Erro: ${error.message}`;
                addLog('ERROR', `Falha na conexão: ${error.message}`);
            }
        };

        // Carregar dados do Firebase
        window.loadFirebaseData = async () => {
            addLog('LOAD', 'Carregando dados do Firebase...');
            try {
                const emAndamentoSnap = await get(ref(db, 'atividades_em_andamento'));
                const concluidasSnap = await get(ref(db, 'atividades_concluidas'));

                const emAndamento = emAndamentoSnap.val() || {};
                const concluidas = concluidasSnap.val() || {};

                document.getElementById('emAndamentoStatus').className = 'status success';
                document.getElementById('emAndamentoStatus').textContent = `✅ ${Object.keys(emAndamento).length} atividades em andamento`;
                document.getElementById('emAndamentoData').textContent = JSON.stringify(emAndamento, null, 2);

                document.getElementById('concluidasStatus').className = 'status success';
                document.getElementById('concluidasStatus').textContent = `✅ ${Object.keys(concluidas).length} atividades concluídas`;
                document.getElementById('concluidasData').textContent = JSON.stringify(concluidas, null, 2);

                addLog('SUCCESS', `Firebase: ${Object.keys(emAndamento).length} + ${Object.keys(concluidas).length}`);
            } catch (error) {
                addLog('ERROR', `Erro ao carregar: ${error.message}`);
            }
        };

        // Sincronizar localStorage para Firebase
        window.syncLocalToFirebase = async () => {
            if (!confirm('Sincronizar localStorage → Firebase?')) return;
            addLog('SYNC', 'Sincronizando localStorage para Firebase...');
            try {
                const emAndamento = JSON.parse(localStorage.getItem('atividadesEmAndamento') || '[]');
                const concluidas = JSON.parse(localStorage.getItem('atividades') || '[]');

                // Criar estrutura de Firebase
                const fbData = {};
                emAndamento.forEach(a => {
                    fbData[`atividades_em_andamento/${a.id || Math.random()}`] = a;
                });
                concluidas.forEach(a => {
                    fbData[`atividades_concluidas/${a.id || Math.random()}`] = a;
                });

                addLog('SUCCESS', 'Sincronização concluída');
                await loadFirebaseData();
            } catch (error) {
                addLog('ERROR', `Erro: ${error.message}`);
            }
        };

        window.syncFirebaseToLocal = async () => {
            if (!confirm('Sincronizar Firebase → localStorage?')) return;
            addLog('SYNC', 'Sincronizando Firebase para localStorage...');
            try {
                const emAndamentoSnap = await get(ref(db, 'atividades_em_andamento'));
                const concluidasSnap = await get(ref(db, 'atividades_concluidas'));

                const emAndamento = Object.values(emAndamentoSnap.val() || {});
                const concluidas = Object.values(concluidasSnap.val() || {});

                localStorage.setItem('atividadesEmAndamento', JSON.stringify(emAndamento));
                localStorage.setItem('atividades', JSON.stringify(concluidas));

                checkLocalStorage();
                addLog('SUCCESS', 'Sincronização concluída');
            } catch (error) {
                addLog('ERROR', `Erro: ${error.message}`);
            }
        };

        window.resetEverything = async () => {
            if (!confirm('⚠️ RESET TUDO? Isso deletará TODOS os dados!')) return;
            if (!confirm('⚠️ CONFIRME: Tem CERTEZA?')) return;
            
            addLog('RESET', 'Deletando todos os dados...');
            try {
                await remove(ref(db, 'atividades_em_andamento'));
                await remove(ref(db, 'atividades_concluidas'));
                localStorage.clear();
                addLog('SUCCESS', 'Todos os dados deletados');
                setTimeout(() => location.reload(), 1000);
            } catch (error) {
                addLog('ERROR', `Erro: ${error.message}`);
            }
        };

        window.deleteAllFirebase = async () => {
            if (!confirm('❌ DELETAR FIREBASE? TODOS OS DADOS SERÃO PERDIDOS!')) return;
            try {
                await remove(ref(db, 'atividades_em_andamento'));
                await remove(ref(db, 'atividades_concluidas'));
                addLog('SUCCESS', 'Firebase limpo');
                await loadFirebaseData();
            } catch (error) {
                addLog('ERROR', `Erro: ${error.message}`);
            }
        };

        // Auto-check
        checkLocalStorage();
        setTimeout(() => testConnection(), 500);
        setTimeout(() => loadFirebaseData(), 1000);

        // Escutar mudanças em tempo real
        const emAndamentoRef = ref(db, 'atividades_em_andamento');
        const concluidasRef = ref(db, 'atividades_concluidas');

        onChildAdded(emAndamentoRef, (snap) => {
            addLog('FIREBASE 📥', `Nova em andamento: ${snap.val().ticket}`);
            loadFirebaseData();
        });

        onChildChanged(emAndamentoRef, (snap) => {
            addLog('FIREBASE 🔄', `Modificada: ${snap.val().ticket}`);
            loadFirebaseData();
        });

        onChildRemoved(emAndamentoRef, (snap) => {
            addLog('FIREBASE ➖', `Removida: ${snap.val().ticket}`);
            loadFirebaseData();
        });
    </script>
</body>
</html>
