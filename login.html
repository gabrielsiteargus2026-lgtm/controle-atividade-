<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Atividade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            position: relative;
            margin-bottom: 30px;
            padding-top: 20px;
            text-align: center;
            display: none;
        }

        .header-logo {
            position: relative;
            width: 180px;
            height: 180px;
            object-fit: contain;
            z-index: 10000;
            margin-bottom: 10px;
            margin-left: 0;
            top: 0;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
            color: #2c3e50;
            text-align: center;
            margin-left: 0;
            margin-top: 0;
            font-weight: 600;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 50px;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .login-header h1 {
            font-size: 2em;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1.05em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #5b8ec6;
        }

        .form-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-login {
            background: #5b8ec6;
            color: white;
            grid-column: 1 / -1;
        }

        .btn-login:hover:not(:disabled) {
            background: #4a75b0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(91, 142, 198, 0.4);
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-register {
            background: #f0f0f0;
            color: #333;
        }

        .btn-register:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .btn-login-mode {
            background: #5b8ec6;
            color: white;
        }

        .btn-login-mode:hover {
            background: #4a75b0;
            transform: translateY(-2px);
        }

        .toggle-mode {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .toggle-mode p {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 8px;
        }

        .forgot-password-link {
            text-align: right;
            margin-bottom: 15px;
        }

        .forgot-password-link a {
            color: #5b8ec6;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
        }

        .forgot-password-link a:hover {
            text-decoration: underline;
            color: #4a75b0;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.95em;
        }

        .alert-error {
            background: #ffe0e0;
            color: #c92a2a;
            border: 1px solid #ff8787;
        }

        .alert-success {
            background: #d3f9d8;
            color: #2f9e44;
            border: 1px solid #69db7c;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 12px;
            color: #5b8ec6;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #5b8ec6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading.active {
            display: block;
        }

        .form-group-hidden {
            display: none;
        }

        .form-group-hidden.active {
            display: block;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 1.5em;
            }

            .form-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <!-- Container Principal -->
    <div class="container">
        <div class="header">
            <img src="argus-logo 1.png" alt="Argus" class="header-logo" onerror="this.style.display='none'">
            <h1>Controle de Atividade</h1>
        </div>

        <div class="login-container">
            <div class="login-header">
                <h1 style="font-size: 1.8em; margin-top: 0;">Autenticação</h1>
                <p id="headerSubtitle">Acesse sua conta</p>
            </div>

            <div id="alertContainer"></div>

            <!-- Modo Login -->
            <div id="loginMode">
                <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Senha</label>
                    <input type="password" id="loginPassword" placeholder="Sua senha" required>
                </div>
                <div class="forgot-password-link">
                    <a onclick="toggleMode('recuperacao')">Esqueceu a senha?</a>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
                </div>
            </form>

            <div class="loading" id="loadingLogin">
                <span class="spinner"></span> Entrando...
            </div>

            <div class="toggle-mode">
                <p>Não tem conta?</p>
                <button type="button" class="btn-login-mode" onclick="toggleMode('registro')">Criar Conta</button>
            </div>
        </div>

        <!-- Modo Registro -->
        <div id="registerMode" style="display: none;">
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Senha</label>
                    <input type="password" id="registerPassword" placeholder="Min. 6 caracteres" minlength="6" required>
                </div>
                <div class="form-group">
                    <label for="registerName">Nome Completo</label>
                    <input type="text" id="registerName" placeholder="Seu nome" required>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn-login" id="btnRegister">Criar Conta</button>
                </div>
            </form>

            <div class="loading" id="loadingRegister">
                <span class="spinner"></span> Criando conta...
            </div>

            <div class="toggle-mode">
                <p>Já tem conta?</p>
                <button type="button" class="btn-login-mode" onclick="toggleMode('login')">Fazer Login</button>
            </div>
        </div>

        <!-- Modo Recuperação de Senha -->
        <div id="recoveryMode" style="display: none;">
            <form id="recoveryForm" onsubmit="handleRecovery(event)">
                <div class="form-group">
                    <label for="recoveryEmail">Email da Conta</label>
                    <input type="email" id="recoveryEmail" placeholder="seu@email.com" required>
                </div>
                <p style="font-size: 0.9em; color: #666; margin-bottom: 20px; text-align: center;">
                    Enviaremos um link de redefinição de senha para seu email
                </p>
                <div class="form-buttons">
                    <button type="submit" class="btn-login" id="btnRecovery">Enviar Email</button>
                </div>
            </form>

            <div class="loading" id="loadingRecovery">
                <span class="spinner"></span> Enviando...
            </div>

            <div class="toggle-mode">
                <p>Lembrou a senha?</p>
                <button type="button" class="btn-login-mode" onclick="toggleMode('login')">Voltar ao Login</button>
            </div>
        </div>
        </div>
    </div>
    </div>

    <script>
        // Inicializar variáveis globais
        window.auth = null;
        window.db = null;
        
        function showAlert(message, type = 'error') {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alert);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function clearAlerts() {
            document.getElementById('alertContainer').innerHTML = '';
        }

        function toggleMode(mode = null) {
            const loginMode = document.getElementById('loginMode');
            const registerMode = document.getElementById('registerMode');
            const recoveryMode = document.getElementById('recoveryMode');
            
            // Ocultar todos os modos
            loginMode.style.display = 'none';
            registerMode.style.display = 'none';
            recoveryMode.style.display = 'none';
            
            // Mostrar o modo selecionado ou alternar
            if (mode === 'login') {
                loginMode.style.display = 'block';
                document.getElementById('headerSubtitle').textContent = 'Acesse sua conta';
            } else if (mode === 'registro') {
                registerMode.style.display = 'block';
                document.getElementById('headerSubtitle').textContent = 'Crie sua conta';
            } else if (mode === 'recuperacao') {
                recoveryMode.style.display = 'block';
                document.getElementById('headerSubtitle').textContent = 'Redefinir Senha';
            } else {
                // Modo alternância (compatibilidade com código antigo)
                if (loginMode.style.display === 'none') {
                    loginMode.style.display = 'block';
                    registerMode.style.display = 'none';
                    document.getElementById('headerSubtitle').textContent = 'Acesse sua conta';
                } else {
                    loginMode.style.display = 'none';
                    registerMode.style.display = 'block';
                    document.getElementById('headerSubtitle').textContent = 'Crie sua conta';
                }
            }
            
            clearAlerts();
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const loading = document.getElementById('loadingLogin');
            const btn = document.getElementById('btnLogin');

            console.log('Iniciando login com:', email);
            
            // Validações
            if (!email || !password) {
                showAlert('Por favor, preencha email e senha', 'error');
                return;
            }

            // Verificação importante: Firebase está inicializado?
            if (!window.auth) {
                console.error('Firebase não inicializado ainda!');
                showAlert('Firebase não está pronto. Aguarde um momento e tente novamente.', 'error');
                return;
            }
            
            loading.classList.add('active');
            btn.disabled = true;

            console.log('Tentando fazer login...');
            window.auth.signInWithEmailAndPassword(email, password)
                .then(userCredential => {
                    console.log('Login realizado com sucesso:', userCredential.user.email);
                    showAlert('Login realizado com sucesso! Redirecionando...', 'success');
                    
                    // Aguardar 1 segundo antes de redirecionar
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                })
                .catch(error => {
                    console.error('Erro ao fazer login:', error.code, error.message);
                    
                    loading.classList.remove('active');
                    btn.disabled = false;
                    
                    let message = 'Erro ao fazer login';
                    if (error.code === 'auth/user-not-found') {
                        message = 'Email não registrado. Crie uma conta primeiro.';
                    } else if (error.code === 'auth/wrong-password') {
                        message = 'Senha incorreta. Tente novamente ou recupere sua senha.';
                    } else if (error.code === 'auth/invalid-email') {
                        message = 'Email inválido. Verifique e tente novamente.';
                    } else if (error.code === 'auth/user-disabled') {
                        message = 'Usuário desabilitado. Entre em contato com o administrador.';
                    } else if (error.code === 'auth/network-request-failed') {
                        message = 'Erro de rede. Verifique sua conexão com a internet.';
                    } else if (error.code === 'auth/invalid-api-key') {
                        message = 'Configuração do Firebase inválida. Entre em contato com o administrador.';
                    } else if (error.code === 'auth/too-many-requests') {
                        message = 'Muitas tentativas falhas. Tente novamente em alguns minutos.';
                    }
                    
                    showAlert(message, 'error');
                });
        }

        function handleRegister(event) {
            event.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const name = document.getElementById('registerName').value;
            const loading = document.getElementById('loadingRegister');
            const btn = document.getElementById('btnRegister');

            console.log('Iniciando criação de conta para:', email);
            
            // Verificação importante: Firebase está inicializado?
            if (!window.auth || !window.db) {
                console.error('Firebase não inicializado ainda!');
                console.log('   auth:', !!window.auth);
                console.log('   db:', !!window.db);
                showAlert('Firebase não está pronto. Por favor, recarregue a página e tente novamente.', 'error');
                return;
            }

            if (!firebase.auth().currentUser) {
                console.log('Nenhum usuário conectado (esperado para novo registro)');
            }
            
            loading.classList.add('active');
            btn.disabled = true;

            window.auth.createUserWithEmailAndPassword(email, password)
                .then(userCredential => {
                    console.log('Usuário criado no Firebase Auth:', userCredential.user.uid);
                    
                    // Atualizar perfil com o nome
                    return userCredential.user.updateProfile({
                        displayName: name
                    }).then(() => {
                        console.log('Perfil atualizado com nome');
                        
                        // Salvar dados do usuário no database (com fallback se falhar)
                        if (window.db) {
                            return window.db.ref(`usuarios/${userCredential.user.uid}`).set({
                                email: email,
                                nome: name,
                                dataCriacao: new Date().toISOString(),
                                ativo: true
                            }).catch(dbError => {
                                console.warn('Aviso: Não conseguiu salvar dados no database, mas conta foi criada', dbError);
                                // Não falha aqui, pois o usuário já foi criado no Auth
                                return true;
                            });
                        } else {
                            console.warn('Database não disponível, mas conta foi criada no Auth');
                            return true;
                        }
                    });
                })
                .then(() => {
                    console.log('Conta criada com sucesso!');
                    showAlert('Conta criada com sucesso! Entrando...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                })
                .catch(error => {
                    console.error('Erro ao criar conta:', error);
                    console.error('   Código:', error.code);
                    console.error('   Mensagem:', error.message);
                    
                    loading.classList.remove('active');
                    btn.disabled = false;
                    
                    let message = 'Erro ao criar conta: ' + error.message;
                    if (error.code === 'auth/email-already-in-use') {
                        message = 'Email já está registrado';
                    } else if (error.code === 'auth/weak-password') {
                        message = 'Senha muito fraca (mín. 6 caracteres)';
                    } else if (error.code === 'auth/invalid-email') {
                        message = 'Email inválido';
                    } else if (error.code === 'auth/operation-not-allowed') {
                        message = 'Criação de conta desabilitada no Firebase. Acesse o Console Firebase e ative Email/Password em Authentication → Sign-in methods';
                    } else if (error.code === 'auth/network-request-failed') {
                        message = 'Erro de rede. Verifique sua conexão e Firebase Config.';
                    } else if (error.code === 'auth/configuration-not-found') {
                        message = 'Email/Password não está ativado no Firebase. Acesse: Firebase Console → Authentication → Sign-in methods → Ative Email/Password';
                    }
                    
                    showAlert(message, 'error');
                });
        }

        function handleRecovery(event) {
            event.preventDefault();
            const email = document.getElementById('recoveryEmail').value;
            const loading = document.getElementById('loadingRecovery');
            const btn = document.getElementById('btnRecovery');

            console.log('Enviando link de reset para:', email);
            
            if (!window.auth) {
                console.error('Firebase não inicializado ainda!');
                showAlert('Firebase não está pronto. Por favor, recarregue a página e tente novamente.', 'error');
                return;
            }
            
            loading.classList.add('active');
            btn.disabled = true;

            // Enviar email de redefinição
            window.auth.sendPasswordResetEmail(email)
                .then(() => {
                    console.log('Email de reset enviado com sucesso para:', email);
                    showAlert('Email de recuperação enviado! Verifique sua caixa de entrada (e spam).', 'success');
                    
                    // Limpar campo
                    document.getElementById('recoveryEmail').value = '';
                    
                    // Voltar para login após 3 segundos
                    setTimeout(() => {
                        toggleMode('login');
                    }, 3000);
                })
                .catch(error => {
                    console.error('Erro ao enviar email de reset:', error);
                    console.error('   Código:', error.code);
                    console.error('   Mensagem:', error.message);
                    
                    loading.classList.remove('active');
                    btn.disabled = false;
                    
                    let message = 'Erro ao enviar email: ' + error.message;
                    if (error.code === 'auth/user-not-found') {
                        message = 'Email não encontrado no sistema';
                    } else if (error.code === 'auth/invalid-email') {
                        message = 'Email inválido';
                    } else if (error.code === 'auth/too-many-requests') {
                        message = 'Muitas tentativas. Tente novamente em alguns minutos';
                    } else if (error.code === 'auth/network-request-failed') {
                        message = 'Erro de rede. Verifique sua conexão';
                    }
                    
                    showAlert(message, 'error');
                });
        }

        // ===== INICIALIZAÇÃO DO FIREBASE (APÓS TUDO CARREGAR) =====
        // Aguarda um pouco para garantir que todos os scripts carregaram
        setTimeout(() => {
            console.log('Inicializando Firebase...');
            
            if (typeof FIREBASE_CONFIG === 'undefined') {
                console.error('FIREBASE_CONFIG não encontrado. Verifique se firebase-config.js foi carregado.');
                showAlert('Erro: Firebase não foi carregado. Recarregue a página.', 'error');
                return;
            }

            if (FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.databaseURL.includes('COLE_AQUI')) {
                console.error('Firebase Config vazio - contém COLE_AQUI');
                showAlert('Erro: Firebase não está configurado. Contacte o administrador.', 'error');
                return;
            }

            try {
                // Verificar se Firebase já foi inicializado
                if (!firebase.apps || firebase.apps.length === 0) {
                    console.log('Inicializando Firebase pela primeira vez');
                    firebase.initializeApp(FIREBASE_CONFIG);
                }
                
                window.auth = firebase.auth();
                window.db = firebase.database();
                
                // ⭐ ATIVAR PERSISTÊNCIA LOCAL - mantém usuário logado
                window.auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
                    .then(() => {
                        console.log('✅ Persistência LOCAL ativada - usuário permanecerá logado');
                        
                        // Verificar se já tem sessão ativa
                        checkAuthState();
                    })
                    .catch(error => {
                        console.warn('⚠️ Não conseguiu ativar persistência:', error);
                        // Continuar mesmo sem persistência
                        checkAuthState();
                    });
                
                console.log('Firebase Auth inicializado:', !!window.auth);
                console.log('Firebase DB inicializado:', !!window.db);
                console.log('Firebase inicializado com sucesso!');
                
            } catch (error) {
                console.error('Erro ao inicializar Firebase:', error);
                showAlert('Erro ao inicializar Firebase: ' + error.message, 'error');
            }
        }, 500);
        
        // Função para verificar estado de autenticação
        function checkAuthState() {
            console.log('Verificando se há sessão ativa...');
            
            if (!window.auth) {
                console.warn('⚠️ Firebase Auth ainda não inicializado');
                return;
            }
            
            // ⭐ Se usuário já está logado → redirecionar para index.html
            window.auth.onAuthStateChanged(user => {
                if (user) {
                    console.log('✅ Sessão encontrada para:', user.email);
                    // Redirecionar para index.html com delay para completar inicialização
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 300);
                } else {
                    console.log('❌ Nenhuma sessão ativa. Aguardando login do usuário...');
                }
            });
        }
    </script>
</body>
</html>
